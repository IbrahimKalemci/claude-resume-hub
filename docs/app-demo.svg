<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 468" width="460" height="468"
     font-family="ui-sans-serif,system-ui,Segoe UI,Roboto,sans-serif">
  <defs>
    <linearGradient id="win" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0e1526"/><stop offset="0.5" stop-color="#0b0e14"/></linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#131826"/><stop offset="1" stop-color="#0f1420"/></linearGradient>
  </defs>

  <!-- window chrome (constant) -->
  <rect x="2" y="2" width="456" height="464" rx="14" fill="url(#win)" stroke="#232a3d"/>
  <text x="20" y="26" fill="#8b93a7" font-size="11.5" font-weight="600">claude-resume-hub</text>
  <g opacity="0.85"><path d="M410 21h6" stroke="#5a627a" stroke-width="1.4"/><rect x="424" y="18.5" width="6" height="6" rx="1" fill="none" stroke="#5a627a" stroke-width="1.2"/><path d="M438 18l6 6M444 18l-6 6" stroke="#5a627a" stroke-width="1.4"/></g>
  <line x1="2" y1="40" x2="458" y2="40" stroke="#1a2030"/>
  <circle cx="32" cy="64" r="12" fill="#c96442"/><circle cx="32" cy="64" r="7" fill="none" stroke="#f6efe8" stroke-width="1.6"/><path d="M32 59.5V64l3.4 2" fill="none" stroke="#f6efe8" stroke-width="1.7" stroke-linecap="round"/>
  <text x="52" y="69" fill="#e6e9f0" font-size="15" font-weight="700">claude-resume-hub</text>

  <!-- caption chip (per scene) -->
  <rect x="24" y="84" width="412" height="28" rx="14" fill="rgba(201,100,66,0.12)" stroke="rgba(201,100,66,0.4)"/>
  <g text-anchor="middle" font-size="12.5" font-weight="600" fill="#e6b8a6">
    <text x="230" y="102">① Finds your session &amp; resumes automatically<animate attributeName="opacity" dur="15s" repeatCount="indefinite" values="1;1;0;0" keyTimes="0;0.19;0.205;1"/></text>
    <text x="230" y="102">② Tune it your way — settings<animate attributeName="opacity" dur="15s" repeatCount="indefinite" values="0;0;1;1;0;0" keyTimes="0;0.195;0.21;0.395;0.41;1"/></text>
    <text x="230" y="102">③ Phone &amp; chat alerts (webhook / Telegram)<animate attributeName="opacity" dur="15s" repeatCount="indefinite" values="0;0;1;1;0;0" keyTimes="0;0.395;0.41;0.595;0.61;1"/></text>
    <text x="230" y="102">④ Live output — see what it did<animate attributeName="opacity" dur="15s" repeatCount="indefinite" values="0;0;1;1;0;0" keyTimes="0;0.595;0.61;0.795;0.81;1"/></text>
    <text x="230" y="102">⑤ Queue multiple projects<animate attributeName="opacity" dur="15s" repeatCount="indefinite" values="0;0;1;1" keyTimes="0;0.795;0.81;1"/></text>
  </g>

  <!-- ============ Scene A: main / countdown ============ -->
  <g><animate attributeName="opacity" dur="15s" repeatCount="indefinite" values="1;1;0;0" keyTimes="0;0.19;0.205;1"/>
    <rect x="24" y="126" width="412" height="58" rx="11" fill="url(#card)" stroke="#232a3d"/>
    <text x="40" y="150" fill="#3fb950" font-size="11.5" font-family="ui-monospace,Menlo,monospace">384d594d-f53e-4831-bafe-c34bb9307984</text>
    <text x="40" y="168" fill="#5a627a" font-size="10.5">found automatically · last activity 15:04 · 75 prompts</text>
    <rect x="24" y="196" width="412" height="132" rx="12" fill="url(#card)" stroke="#232a3d"/>
    <text x="230" y="224" fill="#d29922" font-size="11" letter-spacing="1.4" text-anchor="middle">RESUMING IN</text>
    <text x="230" y="272" fill="#e6e9f0" font-size="40" font-weight="800" text-anchor="middle" font-family="ui-monospace,Menlo,monospace">00:04:12</text>
    <text x="230" y="300" fill="#8b93a7" font-size="12" text-anchor="middle">Limit hit — resuming automatically at 15:12</text>
    <rect x="24" y="342" width="200" height="30" rx="8" fill="#c96442"/><text x="124" y="362" fill="#fff" font-size="12.5" font-weight="700" text-anchor="middle">Start</text>
    <rect x="236" y="342" width="200" height="30" rx="8" fill="none" stroke="#232a3d"/><text x="336" y="362" fill="#5a627a" font-size="12.5" font-weight="600" text-anchor="middle">Stop</text>
  </g>

  <!-- ============ Scene B: settings ============ -->
  <g><animate attributeName="opacity" dur="15s" repeatCount="indefinite" values="0;0;1;1;0;0" keyTimes="0;0.195;0.21;0.395;0.41;1"/>
    <text x="40" y="146" fill="#8b93a7" font-size="10.5" letter-spacing="1.1" font-weight="700">SETTINGS</text>
    <g font-size="12.5" fill="#e6e9f0">
      <text x="40" y="184">Resume buffer (seconds after reset)</text>
      <rect x="372" y="170" width="56" height="24" rx="7" fill="#0a0d15" stroke="#232a3d"/><text x="400" y="187" text-anchor="middle" font-size="12">30</text>
      <text x="40" y="228">Smart resume by default</text>
      <rect x="392" y="216" width="36" height="20" rx="10" fill="rgba(201,100,66,0.25)" stroke="#c96442"/><circle cx="419" cy="226" r="7" fill="#c96442"/>
      <text x="40" y="272">Start minimised to tray</text>
      <rect x="392" y="260" width="36" height="20" rx="10" fill="#1c2333" stroke="#232a3d"/><circle cx="401" cy="270" r="7" fill="#5a627a"/>
    </g>
    <line x1="40" y1="296" x2="428" y2="296" stroke="#1a2030"/>
    <text x="40" y="322" fill="#8b93a7" font-size="10.5" letter-spacing="1.1" font-weight="700">CUSTOMISABLE · YOUR WORKFLOW</text>
  </g>

  <!-- ============ Scene C: alerts ============ -->
  <g><animate attributeName="opacity" dur="15s" repeatCount="indefinite" values="0;0;1;1;0;0" keyTimes="0;0.395;0.41;0.595;0.61;1"/>
    <text x="40" y="146" fill="#8b93a7" font-size="10.5" letter-spacing="1.1" font-weight="700">PHONE / CHAT ALERTS <tspan fill="#5a627a" font-weight="400">— outgoing only</tspan></text>
    <text x="40" y="172" fill="#8b93a7" font-size="11">Webhook URL (Discord / Slack / ntfy / any)</text>
    <rect x="40" y="180" width="388" height="30" rx="8" fill="#0a0d15" stroke="#232a3d"/><text x="52" y="200" fill="#e6e9f0" font-size="11" font-family="ui-monospace,Menlo,monospace">https://discord.com/api/webhooks/…</text>
    <rect x="40" y="222" width="250" height="30" rx="8" fill="#0a0d15" stroke="#232a3d"/><text x="52" y="242" fill="#8b93a7" font-size="11" font-family="ui-monospace,Menlo,monospace">Telegram bot token</text>
    <rect x="298" y="222" width="130" height="30" rx="8" fill="#0a0d15" stroke="#232a3d"/><text x="310" y="242" fill="#8b93a7" font-size="11" font-family="ui-monospace,Menlo,monospace">chat id</text>
    <rect x="336" y="266" width="92" height="28" rx="8" fill="none" stroke="#232a3d"/><text x="382" y="285" fill="#8b93a7" font-size="12" text-anchor="middle">Send test</text>
    <text x="40" y="285" fill="#3fb950" font-size="12" font-weight="600">✓ sent to your phone</text>
    <text x="40" y="322" fill="#8b93a7" font-size="12">Get pinged on reset · done · error — even away from your PC.</text>
  </g>

  <!-- ============ Scene D: live log ============ -->
  <g><animate attributeName="opacity" dur="15s" repeatCount="indefinite" values="0;0;1;1;0;0" keyTimes="0;0.595;0.61;0.795;0.81;1"/>
    <text x="40" y="146" fill="#8b93a7" font-size="10.5" letter-spacing="1.1" font-weight="700">ACTIVITY — LIVE</text>
    <rect x="24" y="156" width="412" height="192" rx="11" fill="#0a0d15" stroke="#232a3d"/>
    <g font-family="ui-monospace,Menlo,monospace" font-size="11">
      <text x="40" y="182"><tspan fill="#5a627a">15:04  </tspan><tspan fill="#e6e9f0">Resuming session 384d594d…7984</tspan></text>
      <text x="40" y="204"><tspan fill="#5a627a">15:04  </tspan><tspan fill="#d29922">Usage limit hit — resets 15:12</tspan></text>
      <text x="40" y="226"><tspan fill="#5a627a">15:12  </tspan><tspan fill="#c96442">▶ limit reset — resumed</tspan></text>
      <text x="40" y="248"><tspan fill="#5a627a">15:12  </tspan><tspan fill="#8b93a7">Continuing your task — updating the parser…</tspan></text>
      <text x="40" y="270"><tspan fill="#5a627a">15:13  </tspan><tspan fill="#8b93a7">edited src/parser.ts, ran the tests (all pass)</tspan></text>
      <text x="40" y="292"><tspan fill="#5a627a">15:13  </tspan><tspan fill="#3fb950">Done — task complete ✓</tspan></text>
    </g>
    <text x="40" y="332" fill="#8b93a7" font-size="12">See exactly what Claude did — including while you were away.</text>
  </g>

  <!-- ============ Scene E: queue ============ -->
  <g><animate attributeName="opacity" dur="15s" repeatCount="indefinite" values="0;0;1;1" keyTimes="0;0.795;0.81;1"/>
    <text x="40" y="146" fill="#8b93a7" font-size="10.5" letter-spacing="1.1" font-weight="700">QUEUE — ONE ACCOUNT, ONE CLOCK</text>
    <g>
      <rect x="24" y="158" width="412" height="40" rx="10" fill="#0c1018" stroke="#1c2436"/><circle cx="44" cy="178" r="5" fill="#3fb950"/><text x="60" y="176" fill="#e6e9f0" font-size="12">my-api</text><text x="60" y="190" fill="#5a627a" font-size="10.5">continue · done</text>
      <rect x="24" y="204" width="412" height="40" rx="10" fill="#141017" stroke="#c96442"/><circle cx="44" cy="224" r="5" fill="#c96442"/><text x="60" y="222" fill="#e6e9f0" font-size="12">web-frontend</text><text x="60" y="236" fill="#5a627a" font-size="10.5">continue · running</text>
      <rect x="24" y="250" width="412" height="40" rx="10" fill="#0c1018" stroke="#1c2436"/><circle cx="44" cy="270" r="5" fill="#5a627a"/><text x="60" y="268" fill="#e6e9f0" font-size="12">scraper</text><text x="60" y="282" fill="#5a627a" font-size="10.5">task: fix flaky tests · queued</text>
    </g>
    <text x="40" y="322" fill="#8b93a7" font-size="12">Add several projects — they resume in order when the window opens.</text>
  </g>

  <!-- phase pill + footer (constant) -->
  <rect x="386" y="53" width="52" height="22" rx="11" fill="none" stroke="#c96442"/><text x="412" y="68" fill="#c96442" font-size="10.5" font-weight="700" text-anchor="middle">LIVE</text>
  <rect x="158" y="424" width="144" height="24" rx="12" fill="rgba(63,185,80,0.08)" stroke="rgba(63,185,80,0.35)"/>
  <path d="M174 431l2.6 1.1v1.8c0 1.6-1.1 2.7-2.6 3.3-1.5-.6-2.6-1.7-2.6-3.3v-1.8L174 431z" fill="none" stroke="#3fb950" stroke-width="1.2"/>
  <text x="230" y="440" fill="#3fb950" font-size="11" font-weight="600" text-anchor="middle">Zero tokens · runs locally</text>
</svg>
