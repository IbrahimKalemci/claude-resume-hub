<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340" width="760" height="340"
     font-family="ui-sans-serif,system-ui,Segoe UI,Roboto,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16203a"/><stop offset="0.6" stop-color="#0b0e14"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#131826"/><stop offset="1" stop-color="#0f1420"/>
    </linearGradient>
  </defs>

  <rect width="760" height="340" rx="14" fill="url(#bg)"/>

  <!-- header -->
  <circle cx="30" cy="30" r="5" fill="#c96442"/>
  <text x="44" y="35" fill="#e6e9f0" font-size="15" font-weight="700">claude-resume-hub</text>

  <!-- status pills (swap) -->
  <g>
    <rect x="612" y="18" width="64" height="24" rx="12" fill="none" stroke="#d29922"/>
    <text x="644" y="34" fill="#d29922" font-size="12" font-weight="600" text-anchor="middle">waiting</text>
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite"
             values="1;1;0;0" keyTimes="0;0.6666;0.6667;1"/>
  </g>
  <g>
    <rect x="612" y="18" width="64" height="24" rx="12" fill="none" stroke="#3fb950"/>
    <text x="644" y="34" fill="#3fb950" font-size="12" font-weight="600" text-anchor="middle">running</text>
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite"
             values="0;0;1;1" keyTimes="0;0.6666;0.6667;1"/>
  </g>

  <!-- card -->
  <rect x="24" y="58" width="712" height="248" rx="16" fill="url(#card)" stroke="#232a3d"/>

  <!-- labels (swap) -->
  <text x="380" y="102" fill="#8b93a7" font-size="13" letter-spacing="2" text-anchor="middle">RESUMING IN
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite"
             values="1;1;0;0" keyTimes="0;0.6666;0.6667;1"/></text>
  <text x="380" y="102" fill="#3fb950" font-size="13" letter-spacing="2" text-anchor="middle">✓ LIMIT RESET
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite"
             values="0;0;1;1" keyTimes="0;0.6666;0.6667;1"/></text>

  <!-- countdown (each visible ~1s) -->
  <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="70" font-weight="800"
     fill="#e6e9f0" text-anchor="middle">
    <text x="380" y="205">00:00:03
      <animate attributeName="opacity" dur="6s" repeatCount="indefinite"
               values="1;1;0;0" keyTimes="0;0.1666;0.1667;1"/></text>
    <text x="380" y="205">00:00:02
      <animate attributeName="opacity" dur="6s" repeatCount="indefinite"
               values="0;0;1;1;0;0" keyTimes="0;0.1666;0.1667;0.3333;0.3334;1"/></text>
    <text x="380" y="205">00:00:01
      <animate attributeName="opacity" dur="6s" repeatCount="indefinite"
               values="0;0;1;1;0;0" keyTimes="0;0.3333;0.3334;0.5;0.5001;1"/></text>
    <text x="380" y="205" fill="#3fb950">00:00:00
      <animate attributeName="opacity" dur="6s" repeatCount="indefinite"
               values="0;0;1;1;0;0" keyTimes="0;0.5;0.5001;0.6666;0.6667;1"/></text>
  </g>

  <!-- resume stage: sending "continue" to Claude -->
  <g>
    <animate attributeName="opacity" dur="6s" repeatCount="indefinite"
             values="0;0;1;1" keyTimes="0;0.6666;0.6667;1"/>
    <rect x="70" y="126" width="620" height="150" rx="10" fill="#0a0d15" stroke="#232a3d"/>
    <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="16">
      <text x="92" y="172" fill="#8b93a7">$ <tspan fill="#e6e9f0">claude -c -p </tspan><tspan fill="#c96442">"continue"</tspan></text>
      <!-- blinking caret -->
      <rect x="322" y="158" width="9" height="18" fill="#e6e9f0">
        <animate attributeName="opacity" dur="0.9s" repeatCount="indefinite" values="1;1;0;0;1" keyTimes="0;0.4;0.5;0.9;1"/>
      </rect>
      <text x="92" y="212" fill="#3fb950">● Claude is continuing your task…
        <animate attributeName="opacity" dur="6s" repeatCount="indefinite"
                 values="0;0;0;1;1" keyTimes="0;0.6667;0.8;0.83;1"/></text>
      <text x="92" y="244" fill="#8b93a7" font-size="13.5">picking up right where the limit stopped it ↩
        <animate attributeName="opacity" dur="6s" repeatCount="indefinite"
                 values="0;0;0;1;1" keyTimes="0;0.6667;0.86;0.9;1"/></text>
    </g>
  </g>

  <text x="380" y="330" fill="#5a627a" font-size="12.5" text-anchor="middle"
        font-family="ui-monospace,SFMono-Regular,Menlo,monospace">npx claude-resume-hub --web</text>
</svg>
