name: Publish

# Fires when you publish a GitHub Release (Releases → Draft a new release →
# create a tag like v1.4.0 → Publish). Publishes to npm via OIDC "trusted
# publishing" (no stored token — one-time setup on npmjs.com, see docs/RELEASING.md)
# AND builds a standalone .exe per OS, attaching them to the Release.

on:
  release:
    types: [published]

permissions:
  contents: write # write: the binaries job uploads assets to the Release
  id-token: write # required for npm provenance / OIDC trusted publishing

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Update npm (OIDC trusted publishing needs npm >= 11.5)
        run: npm install -g npm@latest
      - name: Set package version from the release tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version
      - name: Run tests
        run: node --test
      - name: Publish to npm
        run: npm publish --provenance --access public

  binaries:
    name: build exe (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset: claude-resume-hub-windows-x64
          - os: macos-latest
            asset: claude-resume-hub-macos-arm64
          - os: ubuntu-latest
            asset: claude-resume-hub-linux-x64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Match version to the release tag
        shell: bash
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version
      - name: Install (esbuild) + build exe
        run: |
          npm install --no-audit --no-fund
          npm run build:exe
      - name: Attach binary to release (raw, no zip — click to download & run)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd dist
          if [ "${RUNNER_OS}" = "Windows" ]; then
            mv claude-resume-hub.exe "${{ matrix.asset }}.exe"
            gh release upload "${GITHUB_REF_NAME}" "${{ matrix.asset }}.exe" --clobber
          else
            mv claude-resume-hub "${{ matrix.asset }}"
            gh release upload "${GITHUB_REF_NAME}" "${{ matrix.asset }}" --clobber
          fi
