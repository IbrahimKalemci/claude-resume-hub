name: Publish

# Fires when you publish a GitHub Release (Releases → Draft a new release →
# create a tag like v1.6.0 → Publish). Publishes to npm via OIDC "trusted
# publishing" (no stored token — one-time setup on npmjs.com, see docs/RELEASING.md)
# AND builds a standalone .exe per OS, attaching them to the Release.

on:
  release:
    types: [published]

permissions:
  contents: write # write: the binaries job uploads assets to the Release
  id-token: write # required for npm provenance / OIDC trusted publishing

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Update npm (OIDC trusted publishing needs npm >= 11.5)
        run: npm install -g npm@latest
      - name: Set package version from the release tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version
      - name: Run tests
        run: node --test
      - name: Publish to npm
        run: npm publish --provenance --access public
      - name: Auto-fill release notes from CHANGELOG
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          node scripts/release-notes.js "${GITHUB_REF_NAME#v}" > /tmp/notes.md
          echo "" >> /tmp/notes.md
          echo "**Full changelog:** https://github.com/IbrahimKalemci/claude-resume-hub/blob/main/CHANGELOG.md" >> /tmp/notes.md
          gh release edit "${GITHUB_REF_NAME}" --notes-file /tmp/notes.md

  desktop:
    name: build desktop app (windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Match version to the release tag
        shell: bash
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version
      - name: Install + build the Electron app
        run: |
          npm install --no-audit --no-fund
          npm run app:build
      - name: Attach claude-resume-hub.exe to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" "dist-app/claude-resume-hub.exe" --clobber

  binaries:
    name: build cli binary (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset: claude-resume-hub-cli
          - os: macos-latest
            asset: claude-resume-hub-cli-macos
          - os: ubuntu-latest
            asset: claude-resume-hub-cli-linux
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Match version to the release tag
        shell: bash
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version
      - name: Install (esbuild) + build exe
        run: |
          npm install --no-audit --no-fund
          npm run build:exe
      - name: Attach binary to release (raw, no zip — click to download & run)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd dist
          if [ "${RUNNER_OS}" = "Windows" ]; then
            mv claude-resume-hub.exe "${{ matrix.asset }}.exe"
            gh release upload "${GITHUB_REF_NAME}" "${{ matrix.asset }}.exe" --clobber
          else
            mv claude-resume-hub "${{ matrix.asset }}"
            gh release upload "${GITHUB_REF_NAME}" "${{ matrix.asset }}" --clobber
          fi
