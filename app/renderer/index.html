<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'" />
<title>claude-resume-hub</title>
<style>
  :root{
    --bg:#0b0e14; --panel1:#131826; --panel2:#0f1420; --line:#232a3d;
    --txt:#e6e9f0; --dim:#8b93a7; --faint:#5a627a;
    --accent:#c96442; --ok:#3fb950; --warn:#d29922; --err:#f85149;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:radial-gradient(700px 380px at 50% -8%, #16203a 0%, var(--bg) 62%);
    color:var(--txt); font-family:ui-sans-serif,system-ui,"Segoe UI",Roboto,sans-serif;
    font-size:13px; -webkit-user-select:none; user-select:none; overflow:hidden;
  }
  .app{display:flex;flex-direction:column;height:100vh}

  /* ---------- header ---------- */
  header{display:flex;align-items:center;gap:9px;padding:12px 14px;-webkit-app-region:drag}
  header .spacer{flex:1}
  .brand{font-weight:700;letter-spacing:.2px;font-size:13.5px}
  .pill{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;
        padding:3px 9px;border-radius:999px;border:1px solid var(--line);color:var(--dim);-webkit-app-region:no-drag}
  .pill.running{color:var(--accent);border-color:var(--accent)}
  .pill.waiting{color:var(--warn);border-color:var(--warn)}
  .pill.done{color:var(--ok);border-color:var(--ok)}
  .pill.error{color:var(--err);border-color:var(--err)}
  .iconbtn{-webkit-app-region:no-drag;background:none;border:1px solid var(--line);color:var(--dim);
           width:26px;height:26px;border-radius:8px;cursor:pointer;display:grid;place-items:center;padding:0}
  .iconbtn:hover{color:var(--txt);border-color:var(--dim)}

  /* ---------- scroll body ---------- */
  main{flex:1;overflow-y:auto;padding:0 14px 12px;display:flex;flex-direction:column;gap:10px}
  main::-webkit-scrollbar{width:8px}
  main::-webkit-scrollbar-thumb{background:#1c2333;border-radius:8px}

  .card{background:linear-gradient(180deg,var(--panel1),var(--panel2));border:1px solid var(--line);
        border-radius:14px;padding:12px}
  .card h2{margin:0 0 8px;font-size:10.5px;text-transform:uppercase;letter-spacing:1.1px;color:var(--dim);font-weight:700}
  .row{display:flex;align-items:center;gap:8px}
  .muted{color:var(--dim)}
  .faint{color:var(--faint)}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  .ellipsis{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  /* ---------- project + session ---------- */
  .path{flex:1;font-size:11.5px;color:var(--dim)}
  .btn{background:none;border:1px solid var(--line);color:var(--dim);border-radius:8px;
       padding:5px 10px;font-size:11.5px;cursor:pointer;font-weight:600}
  .btn:hover{color:var(--txt);border-color:var(--dim)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.primary:hover{filter:brightness(1.08)}
  .btn.primary:disabled,.btn:disabled{opacity:.45;cursor:not-allowed;filter:none}
  .btn.danger{border-color:var(--err);color:var(--err)}

  .session{margin-top:10px;padding:10px;border:1px solid var(--line);border-radius:11px;background:#0c1018}
  .session .id{font-size:11.5px;color:var(--ok)}
  .session .meta{font-size:11px;margin-top:3px}
  .session .prev{font-size:11px;margin-top:5px;color:var(--faint);font-style:italic}
  .linklike{background:none;border:0;color:var(--accent);font-size:11px;cursor:pointer;padding:4px 0;font-weight:600}

  .slist{margin-top:8px;display:flex;flex-direction:column;gap:5px;max-height:150px;overflow-y:auto}
  .srow{display:flex;gap:8px;align-items:center;padding:7px 8px;border:1px solid var(--line);
        border-radius:9px;cursor:pointer;background:#0c1018}
  .srow:hover{border-color:var(--dim)}
  .srow.sel{border-color:var(--accent);background:#141017}
  .srow .dot{width:7px;height:7px;border-radius:50%;background:var(--faint);flex:none}
  .srow.sel .dot{background:var(--accent)}
  .srow .txt{flex:1;min-width:0}
  .srow .t1{font-size:11px}
  .srow .t2{font-size:10.5px;color:var(--faint)}

  /* ---------- status ---------- */
  .status{text-align:center;padding:14px 12px}
  .status .label{font-size:10.5px;letter-spacing:1.4px;text-transform:uppercase;color:var(--dim)}
  .status .big{font-size:40px;font-weight:800;line-height:1.1;margin:8px 0 4px;font-variant-numeric:tabular-nums}
  .status .sub{font-size:11.5px;color:var(--dim);min-height:16px}
  .status .meta{margin-top:8px;font-size:11px;color:var(--faint)}
  .pulse{animation:pulse 1.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}

  /* ---------- task ---------- */
  textarea{width:100%;background:#0a0d15;border:1px solid var(--line);border-radius:10px;color:var(--txt);
           padding:9px;font-size:12px;font-family:inherit;resize:vertical;min-height:56px;outline:none;-webkit-user-select:text;user-select:text}
  textarea:focus{border-color:var(--accent)}
  .hint{font-size:10.5px;color:var(--faint);margin-top:6px;line-height:1.45}
  .toggle{display:flex;align-items:center;gap:7px;cursor:pointer;font-size:11.5px;color:var(--dim)}
  .switch{width:32px;height:18px;border-radius:999px;background:#1c2333;border:1px solid var(--line);position:relative;transition:.15s}
  .switch::after{content:"";position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:var(--faint);transition:.15s}
  .toggle input{display:none}
  .toggle input:checked + .switch{background:rgba(201,100,66,.25);border-color:var(--accent)}
  .toggle input:checked + .switch::after{left:16px;background:var(--accent)}
  .actions{display:flex;gap:8px;margin-top:10px}
  .actions .btn{flex:1;padding:8px}

  /* choice rows */
  .choice{display:flex;align-items:flex-start;gap:9px;padding:9px 10px;border:1px solid var(--line);
          border-radius:11px;background:#0c1018;cursor:pointer;margin-bottom:7px;font-size:12px;line-height:1.4}
  .choice:hover{border-color:var(--dim)}
  .choice input{display:none}
  .radio{width:14px;height:14px;border-radius:50%;border:1.6px solid var(--faint);flex:none;margin-top:1px;position:relative}
  .choice input:checked ~ .radio{border-color:var(--accent)}
  .choice input:checked ~ .radio::after{content:"";position:absolute;inset:2.5px;border-radius:50%;background:var(--accent)}
  .choice:has(input:checked){border-color:var(--accent);background:#141017}
  .choice .sub2{display:block;color:var(--faint);font-size:10.5px;margin-top:2px}

  /* ---------- log ---------- */
  #log{background:#0a0d15;border:1px solid var(--line);border-radius:10px;padding:8px;height:104px;
       overflow-y:auto;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:10.5px;line-height:1.6}
  #log div{white-space:pre-wrap;word-break:break-word}
  #log .t{color:var(--faint);margin-right:6px}

  /* ---------- settings ---------- */
  #settings{display:none}
  #settings.open{display:block}
  .field{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:9px}
  .field label{font-size:11.5px;color:var(--dim)}
  .field input[type=number]{width:74px;background:#0a0d15;border:1px solid var(--line);border-radius:8px;
                            color:var(--txt);padding:5px 8px;font-size:11.5px;outline:none;-webkit-user-select:text;user-select:text}
  footer{padding:8px 14px 10px;font-size:10px;color:var(--faint);text-align:center}
</style>
</head>
<body>
<div class="app">

  <header>
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <circle cx="12" cy="12" r="9.2" stroke="#c96442" stroke-width="1.9"/>
      <path d="M12 6.9V12l3.4 2" stroke="#c96442" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M9.9 9.7l4.6 2.3-4.6 2.3V9.7z" fill="#c96442" opacity=".55"/>
    </svg>
    <span class="brand">claude-resume-hub</span>
    <span class="spacer"></span>
    <span class="pill" id="pill">idle</span>
    <button class="iconbtn" id="gear" title="Settings">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-1.8-.3 1.6 1.6 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1A1.6 1.6 0 0 0 9 19.4a1.6 1.6 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0 .3-1.8 1.6 1.6 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1A1.6 1.6 0 0 0 4.6 9a1.6 1.6 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.6 1.6 0 0 0 1.8.3H9a1.6 1.6 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.6 1.6 0 0 0 1 1.5 1.6 1.6 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8V9a1.6 1.6 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.6 1.6 0 0 0-1.5 1z"/>
      </svg>
    </button>
  </header>

  <main>
    <!-- settings -->
    <section class="card" id="settings">
      <h2>Settings</h2>
      <div class="field">
        <label for="sBuffer">Resume buffer (seconds after reset)</label>
        <input type="number" id="sBuffer" min="0" max="600" value="30" />
      </div>
      <div class="field">
        <label for="sSmart">Smart resume by default</label>
        <label class="toggle"><input type="checkbox" id="sSmart" /><span class="switch"></span></label>
      </div>
      <div class="field" style="margin-bottom:0">
        <label for="sAuto">Start minimised to tray</label>
        <label class="toggle"><input type="checkbox" id="sAuto" /><span class="switch"></span></label>
      </div>
    </section>

    <!-- project + session -->
    <section class="card">
      <h2>Project</h2>
      <div class="row">
        <span class="path ellipsis mono" id="dir">—</span>
        <button class="btn" id="chooseDir">Change</button>
      </div>

      <div class="session" id="activeBox">
        <div class="row">
          <span class="id mono ellipsis" id="actId">no session found</span>
        </div>
        <div class="meta muted" id="actMeta">—</div>
        <div class="prev ellipsis" id="actPrev"></div>
      </div>

      <button class="linklike" id="toggleList">▸ All sessions</button>
      <div class="slist" id="slist" style="display:none"></div>
    </section>

    <!-- status -->
    <section class="card status">
      <div class="label" id="statLabel">Status</div>
      <div class="big mono" id="statBig">—</div>
      <div class="sub" id="statSub">Idle — pick a session and press Start.</div>
      <div class="meta" id="statMeta"></div>
    </section>

    <!-- action -->
    <section class="card">
      <h2>What should Claude do with this session?</h2>

      <label class="choice">
        <input type="radio" name="mode" value="continue" checked /><span class="radio"></span>
        <span><b>Continue</b> where it left off
          <span class="sub2">Sends “continue” the moment the limit resets.</span></span>
      </label>

      <label class="choice">
        <input type="radio" name="mode" value="task" /><span class="radio"></span>
        <span><b>Give it a task</b>
          <span class="sub2">Send your own instruction to this same session instead.</span></span>
      </label>

      <textarea id="task" style="display:none" placeholder="e.g. finish the refactor and run the tests"></textarea>

      <div class="row" style="margin-top:9px;gap:14px;flex-wrap:wrap">
        <label class="toggle"><input type="checkbox" id="smart" /><span class="switch"></span> Smart resume</label>
        <label class="toggle"><input type="checkbox" id="newSession" /><span class="switch"></span> New session</label>
      </div>
      <div class="hint" id="taskHint">Sends “continue” to the session above when the limit opens.</div>

      <div class="actions">
        <button class="btn primary" id="start">Start</button>
        <button class="btn danger" id="stop" disabled>Stop</button>
      </div>
    </section>

    <!-- log -->
    <section class="card">
      <h2>Activity</h2>
      <div id="log"></div>
    </section>
  </main>

  <footer>Runs locally · never reads your tokens</footer>
</div>

<script>
(function () {
  "use strict";
  var $ = function (id) { return document.getElementById(id); };

  // ---- demo fallback so the page can be reviewed in a plain browser ----
  var DEMO = !window.api;
  var api = window.api || {
    getState: function () { return Promise.resolve({ phase: "waiting", cycle: 1, maxCycles: 100,
      resetAt: new Date(Date.now() + 283000).toISOString(), wakeAt: new Date(Date.now() + 313000).toISOString(),
      message: "Limit hit — resuming at 15:12" }); },
    listSessions: function () { return Promise.resolve([
      { id: "384d594d-f53e-4831-bafe-c34bb9307984", mtime: new Date(Date.now() - 6e5).toISOString(), turns: 44, sizeKB: 6109,
        preview: "kanka senden istediğim bu claude için md yazıyolar ya az token yesin" },
      { id: "c51329eb-3b53-4df7-b4de-0b320f209be1", mtime: new Date(Date.now() - 9e6).toISOString(), turns: 10, sizeKB: 1393,
        preview: "dashboard'u bir de karanlık temada dene" }
    ]); },
    chooseFolder: function () { return Promise.resolve(null); },
    start: function () { return Promise.resolve({ ok: true }); },
    stop: function () { return Promise.resolve(); },
    getSettings: function () { return Promise.resolve({ dir: "C:\\Users\\you\\Desktop\\my-project", smart: true, buffer: 30, autoStart: false }); },
    saveSettings: function () { return Promise.resolve(); },
    openExternal: function () { return Promise.resolve(); },
    onState: function () {}, onLog: function () {}
  };

  var state = { phase: "idle", cycle: 0, maxCycles: 100, resetAt: null, wakeAt: null, message: "" };
  var settings = { dir: "", smart: false, buffer: 30, autoStart: false };
  var sessions = [];
  var selectedId = null;
  var wakeMs = null;

  // ---------- helpers ----------
  function fmtCountdown(ms) {
    ms = Math.max(0, ms);
    var s = Math.floor(ms / 1000), h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), x = s % 60;
    return String(h).padStart(2, "0") + ":" + String(m).padStart(2, "0") + ":" + String(x).padStart(2, "0");
  }
  function fmtTime(iso) { try { return new Date(iso).toLocaleTimeString(); } catch (e) { return "—"; } }
  function fmtWhen(iso) { try { return new Date(iso).toLocaleString(); } catch (e) { return "—"; } }
  function short(id) { return id ? id.slice(0, 8) + "…" + id.slice(-4) : ""; }

  // ---------- rendering ----------
  function renderSessions() {
    var list = $("slist");
    list.innerHTML = "";
    sessions.forEach(function (s) {
      var row = document.createElement("div");
      row.className = "srow" + (s.id === selectedId ? " sel" : "");
      row.innerHTML =
        '<span class="dot"></span><div class="txt">' +
        '<div class="t1 mono ellipsis">' + short(s.id) + "</div>" +
        '<div class="t2 ellipsis">' + fmtWhen(s.mtime) + " · " + s.turns + " prompts</div></div>";
      row.onclick = function () { selectedId = s.id; renderSessions(); renderActive(); };
      list.appendChild(row);
    });
    if (!sessions.length) list.innerHTML = '<div class="faint" style="font-size:11px">No sessions in this folder yet.</div>';
  }

  function renderActive() {
    var s = sessions.filter(function (x) { return x.id === selectedId; })[0] || sessions[0] || null;
    if (s) selectedId = s.id;
    $("actId").textContent = s ? s.id : "no session found";
    $("actId").style.color = s ? "" : "var(--faint)";
    $("actMeta").textContent = s ? (fmtWhen(s.mtime) + " · " + s.turns + " prompts · " + s.sizeKB + " KB") : "Run Claude Code in this folder first.";
    $("actPrev").textContent = s && s.preview ? '"' + s.preview + '"' : "";
  }

  function renderStatus() {
    var p = state.phase || "idle";
    $("pill").className = "pill " + p;
    $("pill").textContent = p;

    var big = $("statBig"), label = $("statLabel"), sub = $("statSub"), meta = $("statMeta");
    big.classList.remove("pulse");
    big.style.color = "";

    if (p === "waiting" && wakeMs) {
      label.textContent = "Resuming in";
      big.textContent = fmtCountdown(wakeMs - Date.now());
      big.style.color = "var(--warn)";
      sub.textContent = state.message || "Limit hit";
      meta.textContent = "Resets at " + fmtTime(state.resetAt) + " · cycle " + state.cycle + " / " + state.maxCycles;
    } else if (p === "running" || p === "starting") {
      label.textContent = "Status";
      big.textContent = "▶";
      big.classList.add("pulse");
      big.style.color = "var(--accent)";
      sub.textContent = state.message || "Claude is working…";
      meta.textContent = state.cycle ? "cycle " + state.cycle + " / " + state.maxCycles : "";
    } else if (p === "done") {
      label.textContent = "Status";
      big.textContent = "✓"; big.style.color = "var(--ok)";
      sub.textContent = state.message || "Task complete."; meta.textContent = "";
    } else if (p === "error") {
      label.textContent = "Status";
      big.textContent = "✕"; big.style.color = "var(--err)";
      sub.textContent = state.message || "Stopped."; meta.textContent = "";
    } else {
      label.textContent = "Status";
      big.textContent = "—";
      sub.textContent = "Idle — pick a session and press Start.";
      meta.textContent = "";
    }

    updateButtons();
  }

  function isBusy() {
    var p = state.phase;
    return p === "running" || p === "waiting" || p === "starting";
  }

  function updateButtons() {
    var m = mode(), txt = $("task").value.trim(), isNew = $("newSession").checked;
    // "Give it a task" needs text before you can start.
    $("start").disabled = isBusy() || (m === "task" && !isNew && !txt);
    $("stop").disabled = !isBusy();
  }

  function addLog(entry) {
    var box = $("log");
    var d = document.createElement("div");
    var t = document.createElement("span");
    t.className = "t"; t.textContent = entry.t || new Date().toLocaleTimeString();
    d.appendChild(t);
    d.appendChild(document.createTextNode(entry.line));
    box.appendChild(d);
    box.scrollTop = box.scrollHeight;
    while (box.childNodes.length > 300) box.removeChild(box.firstChild);
  }

  function applyState(s) {
    state = s || state;
    wakeMs = state.wakeAt ? new Date(state.wakeAt).getTime() : null;
    renderStatus();
  }

  // ---------- data ----------
  function loadSessions() {
    return api.listSessions(settings.dir).then(function (list) {
      sessions = list || [];
      if (!sessions.some(function (x) { return x.id === selectedId; })) selectedId = sessions.length ? sessions[0].id : null;
      renderSessions(); renderActive();
    });
  }

  function loadAll() {
    return api.getSettings().then(function (s) {
      settings = s || settings;
      $("dir").textContent = settings.dir || "—";
      $("sBuffer").value = settings.buffer;
      $("sSmart").checked = !!settings.smart;
      $("sAuto").checked = !!settings.autoStart;
      $("smart").checked = !!settings.smart;
      return loadSessions();
    }).then(function () {
      return api.getState().then(applyState);
    });
  }

  // ---------- events ----------
  $("gear").onclick = function () { $("settings").classList.toggle("open"); };
  $("toggleList").onclick = function () {
    var l = $("slist"), open = l.style.display !== "none";
    l.style.display = open ? "none" : "flex";
    $("toggleList").textContent = (open ? "▸" : "▾") + " All sessions";
  };
  $("chooseDir").onclick = function () {
    api.chooseFolder().then(function (dir) {
      if (!dir) return;
      settings.dir = dir; $("dir").textContent = dir;
      api.saveSettings(settings); loadSessions();
    });
  };
  function mode() {
    var el = document.querySelector('input[name="mode"]:checked');
    return el ? el.value : "continue";
  }

  function refreshAction() {
    var m = mode(), isNew = $("newSession").checked, txt = $("task").value.trim();
    $("task").style.display = (m === "task" || isNew) ? "block" : "none";

    var hint = $("taskHint");
    hint.style.color = "";
    if (isNew) {
      hint.innerHTML = "⚠ <b>New session</b> — starts a fresh conversation, it will NOT continue the one above.";
      hint.style.color = "var(--warn)";
    } else if (m === "task") {
      hint.textContent = txt
        ? "Sends your instruction to the session above once the limit opens."
        : "Type the instruction to send to that session.";
    } else {
      hint.textContent = "Sends “continue” to the session above once the limit opens.";
    }
    updateButtons();
  }

  $("start").onclick = function () {
    var m = mode(), isNew = $("newSession").checked, txt = $("task").value.trim();
    var opts = {
      dir: settings.dir, smart: $("smart").checked, buffer: Number($("sBuffer").value) || 30,
      sessionId: null, task: null, prompt: "continue",
    };

    if (isNew) {
      opts.task = txt || "continue";
      addLog({ line: "Starting a NEW session…" });
    } else if (m === "task") {
      opts.sessionId = selectedId;
      opts.prompt = txt;                    // same session, your own instruction
      addLog({ line: "Sending your task to " + short(selectedId || "") + "…" });
    } else {
      opts.sessionId = selectedId;
      opts.prompt = "continue";             // same session, plain continue
      addLog({ line: "Resuming " + short(selectedId || "") + "…" });
    }

    api.start(opts).then(function (r) {
      if (r && r.ok === false) addLog({ line: "Could not start: " + (r.error || "unknown error") });
    });
  };

  Array.prototype.forEach.call(document.querySelectorAll('input[name="mode"]'), function (r) {
    r.addEventListener("change", refreshAction);
  });
  $("newSession").addEventListener("change", refreshAction);
  $("task").addEventListener("input", refreshAction);
  $("stop").onclick = function () { api.stop(); addLog({ line: "Stopped by user." }); };
  ["sBuffer", "sSmart", "sAuto"].forEach(function (id) {
    $(id).addEventListener("change", function () {
      settings.buffer = Number($("sBuffer").value) || 30;
      settings.smart = $("sSmart").checked;
      settings.autoStart = $("sAuto").checked;
      $("smart").checked = settings.smart;
      api.saveSettings(settings);
    });
  });

  api.onState(applyState);
  api.onLog(addLog);
  setInterval(function () { if (state.phase === "waiting" && wakeMs) renderStatus(); }, 1000);

  refreshAction();

  loadAll().then(function () {
    if (DEMO) {
      addLog({ line: "Resuming session 384d594d…7984" });
      addLog({ line: "Usage limit hit (epoch marker). Resets 15:12:28 — resuming at 15:12:58." });
      addLog({ line: "Waiting 4m 43s — will resume at 15:12:58" });
    }
  });
})();
</script>
